syntax = "proto3";

package mesophyll;

message AnyValue {
  // msgpack encoded value
  bytes value = 1;
}

enum TenantType {
  USER = 0;
  GUILD = 1;
}

message Id {
  uint64 tenant_id = 1;
  TenantType tenant_type = 2;
}

message DispatchEventReq {
  Id id = 1; 
  AnyValue event_payload = 2; // contains event name, data, author and (optionally, the stream id as well)
}

message UpdateTenantStateReq {
  Id id = 1; 
  AnyValue new_tenant_state = 2;
}

message StreamMessage {
  Id id = 1; 
  AnyValue payload = 2; // either CtlMessage or LtcMessage
}

message WTMListTenantStates {
  uint64 worker_id = 1;
}

// Sent by the master to the worker to send over key data like number of workers in the pool etc.
message MTWBaseWorkerInfo {
  uint32 num_workers = 1;
}

message WTMExecStateOp {
  uint64 worker_id = 1;
  Id id = 2;
  AnyValue state_op = 3;
  uint32 flags = 4;
}

message WorkerIdent {
  // The worker ID
  uint64 worker_id = 1;
  // The workers unix domain socket path (TODO: switch this to vsock/tcp once/if we use kvm/firecracket/smolmachines in the future)
  string endpoint = 2;
}

message Empty {}
message Bool { bool b = 1; }

// Mesophyll service (runs on master and called by worker)
service MesophyllMaster {
  // ExecStateOp is called by the worker to perform a state op
  //
  // @returns StateExecResponse? (msgpack encoded)
  rpc ExecStateOp(WTMExecStateOp) returns (AnyValue) {}

  // ListTenantStates returns a list of all tenant states from the Mesophyll server
  //
  // @returns HashMap<Id, TenantState> (msgpack encoded)
  rpc ListTenantStates(WTMListTenantStates) returns (AnyValue) {}

  // Base worker info
  rpc BaseWorkerInfo(Empty) returns (MTWBaseWorkerInfo) {}

  // RegisterWorker enables the worker to identify to the master
  //
  // Returns base info like num_workers etc
  rpc RegisterWorker(WorkerIdent) returns (Empty) {}

  // Send a stream message *to* the worker
  rpc SendStream(StreamMessage) returns (Empty) {}
}

service MesophyllWorker {
  // Dispatches an event to this worker
  rpc DispatchEvent(DispatchEventReq) returns (AnyValue) {}

  // Drop tenant
  rpc DropTenant(Id) returns (Empty) {}

  // Shutdown
  rpc Shutdown(Empty) returns (Empty) {}

  // Update tenant state
  rpc UpdateTenantState(UpdateTenantStateReq) returns (Bool) {}

  // Send a stream message *to* the master
  rpc SendStream(StreamMessage) returns (Empty) {}
}